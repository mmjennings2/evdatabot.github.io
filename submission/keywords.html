<h1>Keywords</h1>
<p class="note">ASC field: <strong>App Information → Keywords</strong>. Apple limit: 100 chars. App name and Subtitle terms don't count, so "lightning" and "carplay" repeated below cost nothing extra.</p>
<button class="copy" data-target="block" onclick="copyBlock(this)">Copy to clipboard</button>
<p class="char-count" data-char-count="block"></p>
<textarea id="block" class="short" readonly>f150 lightning,ev,electric vehicle,obd,carplay,trip log,range,battery,charging,ford</textarea>
